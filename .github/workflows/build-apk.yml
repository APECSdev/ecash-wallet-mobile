name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

# Needed for creating releases
permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Install Skip CLI
        run: |
          brew update
          brew install skiptools/skip/skip

      - name: Install Swift Android SDK
        run: skip android sdk install

      - name: Build Debug APK (Android only)
        run: skip export --debug --no-ios

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecash-debug-apk
          path: .build/skip-export/ECashWalletMobile-debug.apk

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-debug-${{ github.run_number }}
          name: Android Debug Build #${{ github.run_number }}
          body: |
            Automated Android debug APK build from commit ${{ github.sha }}

            **To install:**
            Download the `.apk` file below onto your Android device and tap to install.
          files: .build/skip-export/ECashWalletMobile-debug.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}